[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build --workspace=frontend && npm run build --workspace=backend"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "nasaalaga-app"
